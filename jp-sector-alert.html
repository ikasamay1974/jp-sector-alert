<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="JP Alert">
  <title>JP Sector Alert</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#F5F3EF;font-family:'Outfit',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased}
    #hdr{position:sticky;top:0;z-index:20;background:#1C1917;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.15)}
    .h-title{font-size:18px;font-weight:800;color:#FAFAF8;letter-spacing:-.01em}
    .h-meta{font-size:10px;color:#78716C;margin-top:2px;font-family:'IBM Plex Mono',monospace}
    #rbtn{background:#2563EB;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;min-height:44px;min-width:60px;display:flex;align-items:center;justify-content:center}
    #rbtn:disabled{background:#93C5FD;cursor:not-allowed}
    #main{padding-bottom:48px}

    /* KPI strip */
    .chip-row{display:grid;grid-template-columns:1fr 1fr 1fr;background:#E5E2DB;gap:1px;border-top:1px solid #E5E2DB;border-bottom:1px solid #E5E2DB}
    .chip{background:#fff;padding:12px 14px}
    .cl{font-size:9px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .cv{font-size:17px;font-weight:800;font-family:'IBM Plex Mono',monospace;line-height:1}
    .cs{font-size:9px;color:#B0A899;margin-top:3px}

    /* Nikkei futures signal card */
    .nk-card{background:#fff;border-radius:14px;margin:16px 16px 0;box-shadow:0 1px 4px rgba(0,0,0,.07);overflow:hidden}
    .nk-header{padding:12px 16px 10px;border-bottom:1px solid #F3F0EB;display:flex;align-items:center;justify-content:space-between}
    .nk-ht{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.08em}
    .nk-score-pill{font-size:13px;font-weight:800;font-family:'IBM Plex Mono',monospace;padding:4px 12px;border-radius:999px}
    .nk-body{padding:14px 16px 16px}
    .nk-prices{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:14px}
    .nk-pb{background:#FAF9F7;border-radius:8px;padding:10px 12px}
    .nk-pl{font-size:9px;color:#9CA3AF;margin-bottom:4px;text-transform:uppercase;letter-spacing:.05em}
    .nk-pv{font-size:14px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#1C1917}
    .nk-pu{font-size:9px;color:#9CA3AF;margin-left:2px}

    /* Gauge */
    .gauge-wrap{margin-bottom:14px}
    .gauge-labels{display:flex;justify-content:space-between;font-size:9px;color:#C4BAB0;margin-bottom:8px}
    .gauge-track{position:relative;height:8px;border-radius:4px;background:linear-gradient(to right,#FEE2E2,#FEF3C7 40%,#FEF3C7 60%,#DCFCE7)}
    .gauge-center{position:absolute;left:50%;top:-4px;width:1px;height:16px;background:#D1C9BE}
    .gauge-dot{position:absolute;top:-7px;width:22px;height:22px;border-radius:50%;border:3px solid #fff;transform:translateX(-50%);box-shadow:0 2px 8px rgba(0,0,0,.15);transition:left .7s cubic-bezier(.4,0,.2,1)}

    /* Score bar */
    .score-bar-wrap{margin-top:10px}
    .score-bar-label{display:flex;justify-content:space-between;font-size:10px;color:#9CA3AF;margin-bottom:6px}
    .score-bar-track{height:4px;background:#F3F0EB;border-radius:2px;position:relative;overflow:visible}
    .score-bar-fill{height:100%;border-radius:2px;transition:width .7s ease,background .7s ease}
    .score-bar-center{position:absolute;left:50%;top:-3px;width:1px;height:10px;background:#D1C9BE}

    /* Signal verdict box */
    .verdict{border-radius:10px;padding:12px 14px;margin-top:12px;border:1px solid transparent}
    .verdict-title{font-size:16px;font-weight:800;margin-bottom:4px}
    .verdict-desc{font-size:12px;line-height:1.6}
    .verdict-detail{font-size:10px;margin-top:8px;font-family:'IBM Plex Mono',monospace;color:#6B7280;line-height:1.8}

    /* Sections */
    .sec{padding:14px 16px 0}
    .st{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .ac{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .ah{padding:10px 16px;display:flex;align-items:center;gap:8px}
    .ar{padding:13px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid #F5F3EF}
    .ar-name{font-size:15px;font-weight:700;color:#1C1917}
    .ar-code{font-size:11px;color:#9CA3AF;font-family:'IBM Plex Mono',monospace;margin-top:2px}
    .ar-pct{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;text-align:right}
    .ar-sub{font-size:10px;color:#B0A899;margin-top:1px;text-align:right}
    .no-sig{padding:14px 16px;color:#9CA3AF;font-size:13px}
    .sr{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #F5F3EF}
    .sr:last-child{border-bottom:none}
    .sbt{font-size:10px;font-family:'IBM Plex Mono',monospace;color:#B0A899;font-weight:600;width:46px;flex-shrink:0}
    .sn{flex:1;padding-right:8px}.sn1{font-size:13px;font-weight:600;color:#1C1917}.sn2{font-size:10px;color:#B0A899}
    .sp{width:56px;text-align:right;padding-right:10px;flex-shrink:0;font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace}
    .badge{flex-shrink:0;display:inline-block;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:700}

    /* Misc */
    .eb{background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:16px;margin:16px;color:#B91C1C;font-size:13px;line-height:1.7}
    .eb a{color:#2563EB}
    .guide{background:#fff;border-radius:14px;padding:28px 20px;margin:20px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .gi{font-size:40px;margin-bottom:12px}.gt{font-size:20px;font-weight:800;color:#1C1917;margin-bottom:8px}
    .gd{font-size:13px;color:#6B7280;margin-bottom:20px;line-height:1.6}
    .gsteps{display:flex;flex-direction:column;gap:14px}
    .gstep{display:flex;align-items:flex-start;gap:12px;font-size:14px;color:#374151;line-height:1.5}
    .snum{background:#1C1917;color:#FAFAF8;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .fbtn{width:100%;margin-top:24px;font-size:16px;padding:14px;background:#2563EB;color:#fff;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;min-height:52px}
    .lbox{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 20px}
    .lbw{width:180px;height:3px;background:#EDE9E3;border-radius:2px;overflow:hidden}
    .lb{height:100%;width:45%;background:#2563EB;border-radius:2px;animation:slide 1.1s ease-in-out infinite}
    .lt{font-size:13px;color:#9CA3AF;margin-top:16px;text-align:center}
    .disc{margin:20px 16px 8px;font-size:10px;color:#B0A899;line-height:1.7;text-align:center}
    .spin{display:inline-block;animation:spin .7s linear infinite;font-size:18px}
    .grn{color:#16A34A}.red{color:#DC2626}.gry{color:#6B7280}
    @keyframes slide{0%{margin-left:-45%}100%{margin-left:100%}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="hdr">
  <div>
    <div class="h-title">JP Sector Alert</div>
    <div class="h-meta" id="meta"></div>
  </div>
  <button id="rbtn" onclick="doFetch()">更新</button>
</div>
<div id="main">
  <div class="guide">
    <div class="gi">📊</div>
    <div class="gt">JP Sector Alert</div>
    <div class="gd">中川慧教授論文ベースの米国→日本業種 翌朝シグナル。日経先物ベーシスも合わせて表示します。</div>
    <div class="gsteps">
      <div class="gstep"><span class="snum">1</span>US市場クローズ後（日本時間 6〜8時）に「更新」</div>
      <div class="gstep"><span class="snum">2</span>日経先物シグナルと業種別候補を確認</div>
      <div class="gstep"><span class="snum">3</span>楽天証券で 9:00 寄り付きに手動執行</div>
      <div class="gstep"><span class="snum">4</span>引け（14:50頃）にポジションクローズ</div>
    </div>
    <button class="fbtn" onclick="doFetch()">今すぐデータを取得</button>
  </div>
</div>

<script>
const SECTORS={
  XLK:{ja:"テクノロジー",jpCode:"1621",jpName:"電気機器",type:"cyclical",b:1.20},
  XLF:{ja:"金融",jpCode:"1615",jpName:"銀行業",type:"cyclical",b:1.00},
  XLE:{ja:"エネルギー",jpCode:"1618",jpName:"石油・石炭",type:"cyclical",b:0.90},
  XLI:{ja:"資本財",jpCode:"1617",jpName:"機械",type:"cyclical",b:1.00},
  XLY:{ja:"一般消費財",jpCode:"1620",jpName:"小売業",type:"cyclical",b:0.80},
  XLB:{ja:"素材",jpCode:"1616",jpName:"化学・素材",type:"cyclical",b:0.90},
  XLC:{ja:"通信サービス",jpCode:"1624",jpName:"情報通信",type:"neutral",b:0.70},
  XLRE:{ja:"不動産",jpCode:"1629",jpName:"不動産",type:"neutral",b:0.60},
  XLV:{ja:"ヘルスケア",jpCode:"1622",jpName:"医薬品",type:"defensive",b:0.80},
  XLP:{ja:"生活必需品",jpCode:"1619",jpName:"食料品",type:"defensive",b:0.70},
  XLU:{ja:"公益",jpCode:"1627",jpName:"電力・ガス",type:"defensive",b:0.60},
};
const SS=0.70, SM=0.28;

// ── シグナル計算 ──────────────────────────────────────────────────
function calcSectorSigs(u){
  const tk=Object.keys(SECTORS);
  const gF=tk.reduce((s,t)=>s+(u[t]||0),0)/tk.length;
  const cT=["XLK","XLF","XLE","XLI","XLY","XLB"],dT=["XLV","XLP","XLU"];
  const cF=cT.reduce((s,t)=>s+(u[t]||0),0)/cT.length;
  const dF=dT.reduce((s,t)=>s+(u[t]||0),0)/dT.length;
  const cd=cF-dF;
  return tk.map(t=>{
    const s=SECTORS[t],r=u[t]||0,tw=s.type==="cyclical"?1:s.type==="defensive"?-.8:.1;
    return{ticker:t,...s,r,sig:(r*.5+gF*.3+cd*tw*.2)*s.b};
  }).sort((a,b)=>b.sig-a.sig);
}

// 日経先物総合スコア（-100〜+100）
// ベーシス寄与 50%: basis_pctを正規化（±2%を±50とする）
// 米国寄与 50%: 全業種平均リターンを正規化（±2%を±50とする）
function calcNkScore(basisPct, usAvg){
  const basisScore = Math.max(-50, Math.min(50, basisPct * 25));
  const usScore    = Math.max(-50, Math.min(50, usAvg    * 25));
  return Math.round((basisScore + usScore) * 10) / 10;
}

function nkVerdict(score, basisPct){
  if(score >= 40)  return{label:"◆ 強い買いシグナル",c:"#15803D",bg:"#F0FDF4",bc:"#BBF7D0",
    desc:`先物プレミアム＋米国強気。翌朝の日経は強い寄り高が期待されます。`};
  if(score >= 15)  return{label:"▲ 買いシグナル",c:"#16A34A",bg:"#F0FDF4",bc:"#D1FAE5",
    desc:`先物・米国ともに強気寄り。翌朝の日経は小幅高寄り付きが想定されます。`};
  if(score <= -40) return{label:"◆ 強い売りシグナル",c:"#B91C1C",bg:"#FEF2F2",bc:"#FECACA",
    desc:`先物ディスカウント＋米国弱気。翌朝の日経は強い寄り安が懸念されます。`};
  if(score <= -15) return{label:"▼ 売りシグナル",c:"#DC2626",bg:"#FEF2F2",bc:"#FEE2E2",
    desc:`先物・米国ともに弱気寄り。翌朝の日経は小幅安寄り付きが想定されます。`};
  return{label:"— 中立",c:"#6B7280",bg:"#F9FAFB",bc:"#E5E7EB",
    desc:`先物と米国市場のシグナルが拮抗。明確な方向感なし。`};
}

function sMeta(v){
  if(v>SS) return{l:"● 強い買い",c:"#15803D",bg:"#DCFCE7"};
  if(v>SM) return{l:"▲ 買い",c:"#16A34A",bg:"#F0FDF4"};
  if(v<-SS)return{l:"● 強い売り",c:"#B91C1C",bg:"#FEE2E2"};
  if(v<-SM)return{l:"▼ 売り",c:"#DC2626",bg:"#FEF2F2"};
  return{l:"— 中立",c:"#9CA3AF",bg:"#F9FAFB"};
}

const f=(v,d=2,p=false)=>v==null?"—":((p&&v>0)?"+":"")+Number(v).toFixed(d);
const cc=(v,t=.05)=>v>t?"grn":v<-t?"red":"gry";

// ── データ取得 ────────────────────────────────────────────────────
async function fetchOne(sym, proxyFn){
  const yUrl=`https://query2.finance.yahoo.com/v8/finance/chart/${encodeURIComponent(sym)}?interval=1d&range=5d`;
  const url=proxyFn(yUrl);
  const r=await fetch(url,{signal:AbortSignal.timeout(9000)});
  if(!r.ok) throw new Error("HTTP "+r.status);
  const d=await r.json();
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta) throw new Error("no meta");
  const closes=d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close?.filter(x=>x!=null)||[];
  let chg=meta.regularMarketChangePercent||0;
  if(closes.length>=2) chg=((closes[closes.length-1]-closes[closes.length-2])/closes[closes.length-2])*100;
  return{price:meta.regularMarketPrice, chg};
}

const PROXIES=[
  u=>`https://api.allorigins.win/raw?url=${encodeURIComponent(u)}`,
  u=>`https://corsproxy.io/?${encodeURIComponent(u)}`,
  u=>`https://thingproxy.freeboard.io/fetch/${u}`,
];

async function fetchSym(sym){
  for(const fn of PROXIES){
    try{ return await fetchOne(sym,fn); }catch(e){}
  }
  return null; // データなしでも続行
}

async function doFetch(){
  const btn=document.getElementById("rbtn");
  btn.disabled=true;
  btn.innerHTML='<span class="spin">↻</span>';
  setLoading("市場データを取得中…");

  // NK=F : CME円建て日経225先物（Yahoo Finance）
  const syms=[...Object.keys(SECTORS),"^N225","NK=F","USDJPY=X"];
  const results={};
  const batchSize=5;
  try{
    for(let i=0;i<syms.length;i+=batchSize){
      const batch=syms.slice(i,i+batchSize);
      const settled=await Promise.allSettled(batch.map(s=>fetchSym(s).then(v=>({s,v}))));
      settled.forEach(r=>{if(r.status==="fulfilled"&&r.value.v)results[r.value.s]=r.value.v;});
      setLoading(`データ取得中… ${Math.min(i+batchSize,syms.length)}/${syms.length} 銘柄`);
    }

    const usData={};
    Object.keys(SECTORS).forEach(t=>{usData[t]=results[t]?.chg||0;});
    const nkSpot   = results["^N225"]?.price;
    const nkChg    = results["^N225"]?.chg;
    const nkFut    = results["NK=F"]?.price;
    const nkFutChg = results["NK=F"]?.chg;
    const usdJpy   = results["USDJPY=X"]?.price;

    // ベーシス計算
    let basisPct = null;
    if(nkSpot && nkFut && nkFut > 1000){
      basisPct = ((nkFut - nkSpot) / nkSpot) * 100;
    }

    const sigs   = calcSectorSigs(usData);
    const usAvg  = Object.values(usData).reduce((s,v)=>s+v,0)/11;
    const nkScore= basisPct!=null ? calcNkScore(basisPct, usAvg) : null;

    const now=new Date();
    document.getElementById("meta").textContent=
      now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+" 更新";

    render({usData,sigs,usAvg,nkSpot,nkChg,nkFut,nkFutChg,basisPct,nkScore,usdJpy});
  }catch(e){
    showErr(e.message);
  }finally{
    btn.disabled=false;
    btn.textContent="更新";
  }
}

function setLoading(msg){
  document.getElementById("main").innerHTML=
    `<div class="lbox"><div class="lbw"><div class="lb"></div></div><div class="lt">${msg}</div></div>`;
}
function showErr(msg){
  document.getElementById("main").innerHTML=
    `<div class="eb"><b>⚠ データ取得エラー</b><br>${msg}<br><br>
    <b>対処法：</b><br>
    ① 米国市場クローズ後（日本時間 6:00〜8:00）に再試行<br>
    ② 時間をおいて「更新」を押し直す<br><br>
    直接確認: <a href="https://finance.yahoo.com/quote/XLK" target="_blank">Yahoo Finance</a></div>`;
}

// ── 日経先物シグナルカード ────────────────────────────────────────
function nkCardHTML({nkSpot,nkChg,nkFut,nkFutChg,basisPct,nkScore,usdJpy,usAvg}){
  const hasFut = nkFut && basisPct!=null;
  const vd     = nkScore!=null ? nkVerdict(nkScore,basisPct) : null;

  // スコアゲージ (-100〜+100 を 0〜100% に変換)
  const gaugePct = nkScore!=null ? ((nkScore+100)/200)*100 : 50;
  const clamp    = (v,a,b)=>Math.max(a,Math.min(b,v));
  const dotColor = nkScore>15?"#16A34A":nkScore<-15?"#DC2626":"#D97706";

  // スコアバー（中央基準）
  const barW  = nkScore!=null ? Math.abs(nkScore)/2 : 0; // max 50%
  const barSide = nkScore>=0 ? "left:50%" : `left:${50-barW}%`;
  const barColor= nkScore>15?"#16A34A":nkScore<-15?"#DC2626":"#D97706";

  const pillColor = nkScore>15?"#15803D":nkScore<-15?"#B91C1C":"#6B7280";
  const pillBg    = nkScore>15?"#DCFCE7":nkScore<-15?"#FEE2E2":"#F3F4F6";
  const scoreStr  = nkScore!=null ? (nkScore>0?"+":"")+nkScore : "—";

  return `<div class="nk-card">
    <div class="nk-header">
      <div class="nk-ht">🗾 日経先物シグナル</div>
      <div class="nk-score-pill" style="color:${pillColor};background:${pillBg}">
        スコア ${scoreStr}
      </div>
    </div>
    <div class="nk-body">

      <!-- 価格3列 -->
      <div class="nk-prices">
        <div class="nk-pb">
          <div class="nk-pl">日経225 現値</div>
          <div class="nk-pv ${cc(nkChg||0)}">${f(nkSpot)}<span class="nk-pu">円</span></div>
          <div style="font-size:9px;color:#9CA3AF;margin-top:2px">${f(nkChg,2,true)}%</div>
        </div>
        <div class="nk-pb">
          <div class="nk-pl">先物 NK=F</div>
          <div class="nk-pv ${hasFut?cc(nkFutChg||0):"gry"}">${hasFut?f(nkFut):"取得中"}<span class="nk-pu">${hasFut?"円":""}</span></div>
          <div style="font-size:9px;color:#9CA3AF;margin-top:2px">${hasFut?f(nkFutChg,2,true)+"%":"CME円建"}</div>
        </div>
        <div class="nk-pb">
          <div class="nk-pl">ベーシス</div>
          <div class="nk-pv ${hasFut?cc(basisPct,0.1):"gry"}">${hasFut?f(basisPct,3,true)+"<span class='nk-pu'>%</span>":"—"}</div>
          <div style="font-size:9px;color:#9CA3AF;margin-top:2px">${hasFut?(basisPct>0?"先物優位":"先物割安"):"先物未取得"}</div>
        </div>
      </div>

      <!-- ゲージ -->
      <div class="gauge-wrap">
        <div class="gauge-labels"><span>強い売り</span><span>中立</span><span>強い買い</span></div>
        <div class="gauge-track">
          <div class="gauge-center"></div>
          <div class="gauge-dot" style="left:${clamp(gaugePct,5,95)}%;background:${dotColor}"></div>
        </div>
      </div>

      <!-- スコアバー -->
      <div class="score-bar-wrap">
        <div class="score-bar-label">
          <span>スコア構成</span>
          <span style="font-family:'IBM Plex Mono',monospace">
            ベーシス ${hasFut?f(basisPct,2,true)+"%":"—"} ＋ 米国平均 ${f(usAvg,2,true)}%
          </span>
        </div>
        <div class="score-bar-track">
          <div class="score-bar-center"></div>
          ${nkScore!=null?`<div class="score-bar-fill" style="width:${barW}%;${barSide};background:${barColor}"></div>`:""}
        </div>
      </div>

      <!-- 判定ボックス -->
      ${vd?`<div class="verdict" style="background:${vd.bg};border-color:${vd.bc}">
        <div class="verdict-title" style="color:${vd.c}">${vd.label}</div>
        <div class="verdict-desc" style="color:${vd.c}aa">${vd.desc}</div>
        <div class="verdict-detail">
          ベーシス寄与: ${hasFut?f(Math.max(-50,Math.min(50,basisPct*25)),1,true):"—"} pt　/
          米国寄与: ${f(Math.max(-50,Math.min(50,usAvg*25)),1,true)} pt　/
          合計: ${f(nkScore,1,true)} pt
        </div>
      </div>`:""}

      ${!hasFut?`<div style="font-size:11px;color:#9CA3AF;margin-top:10px;line-height:1.7">
        ※ NK=F（CME円建て先物）の取得に失敗しました。ベーシスは米国市場クローズ後の
        <a href="https://www.jpx.co.jp/markets/derivatives/night-session/" target="_blank" style="color:#2563EB">大阪取引所夜間先物</a>でご確認ください。
      </div>`:""}

      ${usdJpy?`<div style="font-size:10px;color:#B0A899;margin-top:10px;font-family:'IBM Plex Mono',monospace">USD/JPY ${f(usdJpy,2)}</div>`:""}
    </div>
  </div>`;
}

// ── 業種カード ────────────────────────────────────────────────────
function acHTML(title,rows,side){
  const up=side==="buy",hc=up?"#15803D":"#B91C1C",hb=up?"#F0FDF4":"#FEF2F2",
        hbr=up?"#BBF7D0":"#FECACA",pill=up?"#DCFCE7":"#FEE2E2",icon=up?"↑":"↓";
  const rs=rows.map(r=>{
    const pc=r.r>0?"#16A34A":r.r<0?"#DC2626":"#6B7280";
    return`<div class="ar"><div style="flex:1"><div class="ar-name">${r.jpName}</div>
      <div class="ar-code">NEXT FUNDS ${r.jpCode} · ${r.ticker}</div></div>
      <div><div class="ar-pct" style="color:${pc}">${f(r.r,2,true)}%</div>
      <div class="ar-sub">US騰落率</div></div></div>`;
  }).join("");
  return`<div class="ac">
    <div class="ah" style="background:${hb};border-bottom:1px solid ${hbr}">
      <span style="color:${hc};font-size:17px;font-weight:800">${icon}</span>
      <span style="color:${hc};font-size:13px;font-weight:700">${title}</span>
      <span style="margin-left:auto;color:${hc};font-size:11px;font-weight:600;background:${pill};padding:2px 9px;border-radius:999px">${rows.length}業種</span>
    </div>${rows.length===0?'<div class="no-sig">シグナルなし</div>':rs}</div>`;
}

function srHTML(row){
  const m=sMeta(row.sig),pc=row.r>.05?"#16A34A":row.r<-.05?"#DC2626":"#6B7280";
  return`<div class="sr">
    <div class="sbt">${row.ticker}</div>
    <div class="sn"><div class="sn1">${row.jpName}</div><div class="sn2">${row.ja}</div></div>
    <div class="sp" style="color:${pc}">${f(row.r,2,true)}%</div>
    <span class="badge" style="color:${m.c};background:${m.bg}">${m.l}</span>
  </div>`;
}

    <!-- 業種執行候補 -->

      ${acHTML("買い候補",buy,"buy")}

    <!-- 全業種一覧 -->

      日経スコア = ベーシス寄与（50%）+ 米国平均寄与（50%）。スコア±15以上で方向シグナル発生。<br>
      中川慧教授論文（部分空間正則化PCA）簡易実装。投資判断は自己責任で行ってください。
    </div>`;
}
