<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black">
  <meta name="apple-mobile-web-app-title" content="JP Alert">
  <title>JP Sector Alert</title>
  <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;700&family=Outfit:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
    body{background:#F5F3EF;font-family:'Outfit',sans-serif;max-width:430px;margin:0 auto;min-height:100vh;-webkit-font-smoothing:antialiased}
    #hdr{position:sticky;top:0;z-index:20;background:#1C1917;padding:14px 18px 12px;display:flex;align-items:center;justify-content:space-between;box-shadow:0 2px 12px rgba(0,0,0,.15)}
    .h-title{font-size:18px;font-weight:800;color:#FAFAF8;letter-spacing:-.01em}
    .h-meta{font-size:10px;color:#78716C;margin-top:2px;font-family:'IBM Plex Mono',monospace}
    #rbtn{background:#2563EB;color:#fff;border:none;border-radius:10px;padding:10px 20px;font-size:14px;font-weight:700;font-family:'Outfit',sans-serif;cursor:pointer;min-height:44px;min-width:60px;display:flex;align-items:center;justify-content:center}
    #rbtn:disabled{background:#93C5FD;cursor:not-allowed}
    #main{padding-bottom:40px}
    .chip-row{display:grid;grid-template-columns:1fr 1fr 1fr;background:#E5E2DB;gap:1px;border-top:1px solid #E5E2DB;border-bottom:1px solid #E5E2DB}
    .chip{background:#fff;padding:12px 14px}
    .cl{font-size:9px;color:#9CA3AF;text-transform:uppercase;letter-spacing:.06em;margin-bottom:4px}
    .cv{font-size:17px;font-weight:800;font-family:'IBM Plex Mono',monospace;line-height:1}
    .cs{font-size:9px;color:#B0A899;margin-top:3px}
    .sec{padding:18px 16px 0}
    .st{font-size:11px;font-weight:700;color:#9CA3AF;text-transform:uppercase;letter-spacing:.08em;margin-bottom:10px}
    .card{background:#fff;border-radius:12px;padding:16px;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .ac{background:#fff;border-radius:12px;overflow:hidden;box-shadow:0 1px 3px rgba(0,0,0,.06)}
    .ah{padding:10px 16px;display:flex;align-items:center;gap:8px}
    .ar{padding:13px 16px;display:flex;align-items:center;gap:12px;border-top:1px solid #F5F3EF}
    .ar-name{font-size:15px;font-weight:700;color:#1C1917}
    .ar-code{font-size:11px;color:#9CA3AF;font-family:'IBM Plex Mono',monospace;margin-top:2px}
    .ar-pct{font-size:16px;font-weight:700;font-family:'IBM Plex Mono',monospace;text-align:right}
    .ar-sub{font-size:10px;color:#B0A899;margin-top:1px;text-align:right}
    .no-sig{padding:14px 16px;color:#9CA3AF;font-size:13px}
    .sr{display:flex;align-items:center;padding:11px 0;border-bottom:1px solid #F5F3EF}
    .sr:last-child{border-bottom:none}
    .sbt{font-size:10px;font-family:'IBM Plex Mono',monospace;color:#B0A899;font-weight:600;width:46px;flex-shrink:0}
    .sn{flex:1;padding-right:8px}.sn1{font-size:13px;font-weight:600;color:#1C1917}.sn2{font-size:10px;color:#B0A899}
    .sp{width:56px;text-align:right;padding-right:10px;flex-shrink:0;font-size:13px;font-weight:600;font-family:'IBM Plex Mono',monospace}
    .badge{flex-shrink:0;display:inline-block;padding:4px 9px;border-radius:999px;font-size:11px;font-weight:700}
    .eb{background:#FEF2F2;border:1px solid #FECACA;border-radius:12px;padding:16px;margin:16px;color:#B91C1C;font-size:13px;line-height:1.7}
    .eb a{color:#2563EB}
    .guide{background:#fff;border-radius:14px;padding:28px 20px;margin:20px 16px;box-shadow:0 1px 4px rgba(0,0,0,.06)}
    .gi{font-size:40px;margin-bottom:12px}.gt{font-size:20px;font-weight:800;color:#1C1917;margin-bottom:8px}
    .gd{font-size:13px;color:#6B7280;margin-bottom:20px;line-height:1.6}
    .gsteps{display:flex;flex-direction:column;gap:14px}
    .gstep{display:flex;align-items:flex-start;gap:12px;font-size:14px;color:#374151;line-height:1.5}
    .snum{background:#1C1917;color:#FAFAF8;width:26px;height:26px;border-radius:50%;display:inline-flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;flex-shrink:0}
    .fbtn{width:100%;margin-top:24px;font-size:16px;padding:14px;background:#2563EB;color:#fff;border:none;border-radius:10px;font-family:'Outfit',sans-serif;font-weight:700;cursor:pointer;min-height:52px}
    .lbox{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 20px}
    .lbw{width:180px;height:3px;background:#EDE9E3;border-radius:2px;overflow:hidden}
    .lb{height:100%;width:45%;background:#2563EB;border-radius:2px;animation:slide 1.1s ease-in-out infinite}
    .lt{font-size:13px;color:#9CA3AF;margin-top:16px}
    .pg{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:10px}
    .pb{background:#FAF9F7;border-radius:8px;padding:10px 12px}
    .pl{font-size:10px;color:#9CA3AF;margin-bottom:4px}
    .pv{font-size:15px;font-weight:700;font-family:'IBM Plex Mono',monospace;color:#1C1917}
    .disc{margin:20px 16px 8px;font-size:10px;color:#B0A899;line-height:1.7;text-align:center}
    .spin{display:inline-block;animation:spin .7s linear infinite;font-size:18px}
    .grn{color:#16A34A}.red{color:#DC2626}.gry{color:#6B7280}
    @keyframes slide{0%{margin-left:-45%}100%{margin-left:100%}}
    @keyframes spin{to{transform:rotate(360deg)}}
  </style>
</head>
<body>
<div id="hdr">
  <div>
    <div class="h-title">JP Sector Alert</div>
    <div class="h-meta" id="meta"></div>
  </div>
  <button id="rbtn" onclick="doFetch()">更新</button>
</div>
<div id="main">
  <div class="guide">
    <div class="gi">📊</div>
    <div class="gt">JP Sector Alert</div>
    <div class="gd">中川慧教授論文ベースの米国→日本業種 翌朝シグナル。</div>
    <div class="gsteps">
      <div class="gstep"><span class="snum">1</span>US市場クローズ後（日本時間 6〜8時）に「更新」</div>
      <div class="gstep"><span class="snum">2</span>買い・売り候補業種を確認</div>
      <div class="gstep"><span class="snum">3</span>楽天証券で 9:00 寄り付きに手動執行</div>
      <div class="gstep"><span class="snum">4</span>引け（14:50頃）にポジションクローズ</div>
    </div>
    <button class="fbtn" onclick="doFetch()">今すぐデータを取得</button>
  </div>
</div>

<script>
const SECTORS={
  XLK:{ja:"テクノロジー",jpCode:"1621",jpName:"電気機器",type:"cyclical",b:1.20},
  XLF:{ja:"金融",jpCode:"1615",jpName:"銀行業",type:"cyclical",b:1.00},
  XLE:{ja:"エネルギー",jpCode:"1618",jpName:"石油・石炭",type:"cyclical",b:0.90},
  XLI:{ja:"資本財",jpCode:"1617",jpName:"機械",type:"cyclical",b:1.00},
  XLY:{ja:"一般消費財",jpCode:"1620",jpName:"小売業",type:"cyclical",b:0.80},
  XLB:{ja:"素材",jpCode:"1616",jpName:"化学・素材",type:"cyclical",b:0.90},
  XLC:{ja:"通信サービス",jpCode:"1624",jpName:"情報通信",type:"neutral",b:0.70},
  XLRE:{ja:"不動産",jpCode:"1629",jpName:"不動産",type:"neutral",b:0.60},
  XLV:{ja:"ヘルスケア",jpCode:"1622",jpName:"医薬品",type:"defensive",b:0.80},
  XLP:{ja:"生活必需品",jpCode:"1619",jpName:"食料品",type:"defensive",b:0.70},
  XLU:{ja:"公益",jpCode:"1627",jpName:"電力・ガス",type:"defensive",b:0.60},
};
const SS=0.70,SM=0.28;

function calcSig(u){
  const tk=Object.keys(SECTORS);
  const gF=tk.reduce((s,t)=>s+(u[t]||0),0)/tk.length;
  const cT=["XLK","XLF","XLE","XLI","XLY","XLB"],dT=["XLV","XLP","XLU"];
  const cF=cT.reduce((s,t)=>s+(u[t]||0),0)/cT.length;
  const dF=dT.reduce((s,t)=>s+(u[t]||0),0)/dT.length;
  const cd=cF-dF;
  return tk.map(t=>{
    const s=SECTORS[t],r=u[t]||0,tw=s.type==="cyclical"?1:s.type==="defensive"?-.8:.1;
    return{ticker:t,...s,r,sig:(r*.5+gF*.3+cd*tw*.2)*s.b};
  }).sort((a,b)=>b.sig-a.sig);
}

function sMeta(v){
  if(v>SS)return{l:"● 強い買い",c:"#15803D",bg:"#DCFCE7"};
  if(v>SM)return{l:"▲ 買い",c:"#16A34A",bg:"#F0FDF4"};
  if(v<-SS)return{l:"● 強い売り",c:"#B91C1C",bg:"#FEE2E2"};
  if(v<-SM)return{l:"▼ 売り",c:"#DC2626",bg:"#FEF2F2"};
  return{l:"— 中立",c:"#9CA3AF",bg:"#F9FAFB"};
}

const f=(v,d=2,p=false)=>v==null?"—":((p&&v>0)?"+":"")+Number(v).toFixed(d);
const cc=(v,t=.05)=>v>t?"grn":v<-t?"red":"gry";

// ── データ取得：3つの方法を順番に試す ──────────────────────────────

// 方法1: allorigins経由でYahoo Finance v8（1銘柄ずつ）
async function fetchOneAllorigins(sym){
  const yUrl=`https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d&events=history`;
  const proxy=`https://api.allorigins.win/raw?url=${encodeURIComponent(yUrl)}`;
  const r=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta)throw new Error("no data");
  const prev=d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
  const closes=prev?.filter(x=>x!=null);
  let chg=0;
  if(closes&&closes.length>=2){
    chg=((closes[closes.length-1]-closes[closes.length-2])/closes[closes.length-2])*100;
  } else if(meta.regularMarketChangePercent){
    chg=meta.regularMarketChangePercent;
  }
  return{price:meta.regularMarketPrice,chg};
}

// 方法2: corsproxy.io経由でYahoo Finance v8
async function fetchOneCorsproxy(sym){
  const yUrl=`https://query2.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
  const proxy=`https://corsproxy.io/?${encodeURIComponent(yUrl)}`;
  const r=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta)throw new Error("no data");
  const prev=d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
  const closes=prev?.filter(x=>x!=null);
  let chg=0;
  if(closes&&closes.length>=2){
    chg=((closes[closes.length-1]-closes[closes.length-2])/closes[closes.length-2])*100;
  } else if(meta.regularMarketChangePercent){
    chg=meta.regularMarketChangePercent;
  }
  return{price:meta.regularMarketPrice,chg};
}

// 方法3: thingproxy.freeboard.io 経由
async function fetchOneThingproxy(sym){
  const yUrl=`https://query1.finance.yahoo.com/v8/finance/chart/${sym}?interval=1d&range=5d`;
  const proxy=`https://thingproxy.freeboard.io/fetch/${yUrl}`;
  const r=await fetch(proxy,{signal:AbortSignal.timeout(8000)});
  if(!r.ok)throw new Error(r.status);
  const d=await r.json();
  const meta=d?.chart?.result?.[0]?.meta;
  if(!meta)throw new Error("no data");
  const prev=d?.chart?.result?.[0]?.indicators?.quote?.[0]?.close;
  const closes=prev?.filter(x=>x!=null);
  let chg=0;
  if(closes&&closes.length>=2){
    chg=((closes[closes.length-1]-closes[closes.length-2])/closes[closes.length-2])*100;
  } else if(meta.regularMarketChangePercent){
    chg=meta.regularMarketChangePercent;
  }
  return{price:meta.regularMarketPrice,chg};
}

async function fetchSym(sym){
  const fns=[fetchOneAllorigins,fetchOneCorsproxy,fetchOneThingproxy];
  for(const fn of fns){
    try{return await fn(sym);}catch(e){/* try next */}
  }
  throw new Error(`${sym}: 全プロキシで取得失敗`);
}

async function doFetch(){
  const btn=document.getElementById("rbtn");
  btn.disabled=true;
  btn.innerHTML='<span class="spin">↻</span>';
  setLoading("市場データを取得中… (30秒ほどかかります)");
  try{
    const syms=[...Object.keys(SECTORS),"^N225","USDJPY=X"];
    const results={};
    // 並列取得（5件ずつバッチ）
    const batchSize=5;
    for(let i=0;i<syms.length;i+=batchSize){
      const batch=syms.slice(i,i+batchSize);
      const settled=await Promise.allSettled(batch.map(s=>fetchSym(s).then(v=>({s,v}))));
      settled.forEach(r=>{if(r.status==="fulfilled")results[r.value.s]=r.value.v;});
      // 進捗表示
      const done=Math.min(i+batchSize,syms.length);
      setLoading(`データ取得中… ${done}/${syms.length} 銘柄完了`);
    }

    const usData={};
    Object.keys(SECTORS).forEach(t=>{usData[t]=results[t]?.chg||0;});
    const nkPrice=results["^N225"]?.price;
    const nkChg=results["^N225"]?.chg;
    const usdJpy=results["USDJPY=X"]?.price;

    const sigs=calcSig(usData);
    const avg=Object.values(usData).reduce((s,v)=>s+v,0)/11;
    const now=new Date();
    document.getElementById("meta").textContent=now.toLocaleTimeString("ja-JP",{hour:"2-digit",minute:"2-digit"})+" 更新";
    render({usData,sigs,avg,nkPrice,nkChg,usdJpy});
  }catch(e){
    showErr(e.message);
  }finally{
    btn.disabled=false;
    btn.textContent="更新";
  }
}

function setLoading(msg){
  document.getElementById("main").innerHTML=`<div class="lbox"><div class="lbw"><div class="lb"></div></div><div class="lt">${msg}</div></div>`;
}

function showErr(msg){
  document.getElementById("main").innerHTML=`<div class="eb">
    <b>⚠ データ取得エラー</b><br>${msg}<br><br>
    <b>対処法：</b><br>
    ① 米国市場クローズ後（日本時間 6:00〜8:00）に再試行<br>
    ② 時間をおいて「更新」を再度押す<br>
    ③ Safariの場合：設定 → Safari → 機能拡張でブロッカーを一時オフ<br><br>
    直接確認: <a href="https://finance.yahoo.com/quote/XLK" target="_blank">Yahoo Finance</a>
  </div>`;
}

function acHTML(title,rows,side){
  const up=side==="buy",hc=up?"#15803D":"#B91C1C",hb=up?"#F0FDF4":"#FEF2F2",
        hbr=up?"#BBF7D0":"#FECACA",pill=up?"#DCFCE7":"#FEE2E2",icon=up?"↑":"↓";
  const rs=rows.map(r=>{
    const pc=r.r>0?"#16A34A":r.r<0?"#DC2626":"#6B7280";
    return`<div class="ar"><div style="flex:1"><div class="ar-name">${r.jpName}</div><div class="ar-code">NEXT FUNDS ${r.jpCode} · ${r.ticker}</div></div><div><div class="ar-pct" style="color:${pc}">${f(r.r,2,true)}%</div><div class="ar-sub">US騰落率</div></div></div>`;
  }).join("");
  return`<div class="ac"><div class="ah" style="background:${hb};border-bottom:1px solid ${hbr}"><span style="color:${hc};font-size:17px;font-weight:800">${icon}</span><span style="color:${hc};font-size:13px;font-weight:700">${title}</span><span style="margin-left:auto;color:${hc};font-size:11px;font-weight:600;background:${pill};padding:2px 9px;border-radius:999px">${rows.length}業種</span></div>${rows.length===0?'<div class="no-sig">シグナルなし</div>':rs}</div>`;
}

function srHTML(row){
  const m=sMeta(row.sig),pc=row.r>.05?"#16A34A":row.r<-.05?"#DC2626":"#6B7280";
  return`<div class="sr"><div class="sbt">${row.ticker}</div><div class="sn"><div class="sn1">${row.jpName}</div><div class="sn2">${row.ja}</div></div><div class="sp" style="color:${pc}">${f(row.r,2,true)}%</div><span class="badge" style="color:${m.c};background:${m.bg}">${m.l}</span></div>`;
}

function render({usData,sigs,avg,nkPrice,nkChg,usdJpy}){
  const buy=sigs.filter(s=>s.sig>SM).slice(0,3);
  const sell=[...sigs].reverse().filter(s=>s.sig<-SM).slice(0,3);
  const nkBlock=nkPrice?`
    <div class="sec"><div class="st">日経225</div><div class="card">
      <div class="pg">
        <div class="pb"><div class="pl">現値</div><div class="pv">${f(nkPrice)}<span style="font-size:10px;color:#9CA3AF;margin-left:2px">円</span></div></div>
        <div class="pb"><div class="pl">前日比</div><div class="pv ${cc(nkChg||0)}">${f(nkChg,2,true)}<span style="font-size:10px;margin-left:2px">%</span></div></div>
      </div>
      ${usdJpy?`<div style="font-size:11px;color:#9CA3AF;font-family:'IBM Plex Mono',monospace">USD/JPY ${f(usdJpy,2)}</div>`:""}
      <div style="margin-top:12px;font-size:11px;color:#9CA3AF;line-height:1.6">
        先物ベーシスは <a href="https://www.jpx.co.jp/markets/derivatives/night-session/" target="_blank" style="color:#2563EB">大阪取引所 夜間先物</a> でご確認ください。
      </div>
    </div></div>`:"";

  document.getElementById("main").innerHTML=`
    <div class="chip-row">
      <div class="chip"><div class="cl">米国11業種</div><div class="cv ${cc(avg)}">${f(avg,2,true)}%</div><div class="cs">単純平均</div></div>
      <div class="chip"><div class="cl">日経225</div><div class="cv ${cc(nkChg||0)}">${f(nkChg,2,true)}%</div><div class="cs">前日比</div></div>
      <div class="chip"><div class="cl">執行候補</div><div class="cv" style="color:#1D4ED8">買${buy.length}/売${sell.length}</div><div class="cs">業種</div></div>
    </div>
    <div class="sec"><div class="st">明日の執行候補（楽天証券）</div>${acHTML("買い候補",buy,"buy")}</div>
    <div class="sec" style="padding-top:10px">${acHTML("売り候補",sell,"sell")}</div>
    ${nkBlock}
    <div class="sec"><div class="st">全業種シグナル一覧</div><div class="card">
      <div style="display:flex;padding-bottom:8px;border-bottom:1px solid #F3F0EB;margin-bottom:2px">
        <div style="width:46px;font-size:9px;color:#C4BAB0">ETF</div>
        <div style="flex:1;font-size:9px;color:#C4BAB0">日本業種</div>
        <div style="width:56px;text-align:right;padding-right:10px;font-size:9px;color:#C4BAB0">米国騰落</div>
        <div style="font-size:9px;color:#C4BAB0">判定</div>
      </div>
      ${sigs.map(srHTML).join("")}
      <div style="margin-top:12px;padding-top:10px;border-top:1px solid #F5F3EF;font-size:10px;color:#C4BAB0;line-height:1.7">
        ※ 直接リターン50% + グローバルファクター30% + シクリカル差20% × β
      </div>
    </div></div>
    <div class="disc">本シグナルは中川慧教授論文（部分空間正則化PCA）の簡易実装です。投資判断は自己責任で行ってください。</div>`;
}
</script>
</body>
</html>
